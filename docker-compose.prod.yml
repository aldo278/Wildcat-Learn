version: '3.8'

services:
  # Backend service - Production
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: wildcat-learn-backend-prod
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - PORT=3001
      - NODE_ENV=production
      - FRONTEND_URL=${FRONTEND_URL:-https://your-domain.com}
    volumes:
      - backend_data:/app/data
      - ./backend/dev.db:/app/dev.db:rw
      - ./backend/logs:/app/logs
    networks:
      - wildcat-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Frontend service - Production
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wildcat-learn-frontend-prod
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wildcat-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # PostgreSQL Database - Production
  postgres:
    image: postgres:15-alpine
    container_name: wildcat-learn-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wildcat_learn}
      POSTGRES_USER: ${POSTGRES_USER:-wildcat_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - wildcat-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wildcat_user} -d ${POSTGRES_DB:-wildcat_learn}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: wildcat-learn-redis-prod
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - wildcat-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  backend_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  wildcat-network:
    driver: bridge
